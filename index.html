
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Project Secretary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080f;--bg2:#0b0b18;--bg3:#10101e;
  --border:#181828;--border2:#2d3748;
  --text:#dde2ec;--text2:#8892a4;--text3:#4b5563;
  --indigo:#6366f1;--violet:#8b5cf6;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:248px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sidebar-scroll{flex:1;overflow-y:auto;}
.content{flex:1;overflow-y:auto;padding:18px;}
.ai-panel{width:320px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
@media(max-width:700px){
  .sidebar{display:none;}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;height:100%;z-index:100;width:82vw;box-shadow:4px 0 24px #000b;}
  .ai-panel{display:none;}
  .ai-panel.open{display:flex;position:fixed;top:0;right:0;height:100%;z-index:100;width:94vw;box-shadow:-4px 0 24px #000b;}
  .content{padding:12px;}
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-title{font-weight:700;font-size:13px;letter-spacing:.06em;color:#c7d2fe;}
.logo-sub{font-size:10px;color:var(--text3);}
.topbar-actions{display:flex;gap:6px;align-items:center;}
.btn{padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;border-color:transparent;}
.btn-ai{border-color:var(--border);color:var(--text3);}
.btn-ai.active{border-color:var(--indigo);background:#1e1b4b;color:#a5b4fc;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-icon{padding:4px 7px;font-size:11px;}
.sb-section{padding:8px 10px;border-bottom:1px solid var(--border);}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:5px;padding:0 2px;}
.sb-btn{display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;border-radius:6px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:2px;transition:all .15s;text-align:left;}
.sb-btn.active{background:#1a1a2e;color:#c7d2fe;}
.sb-count{margin-left:auto;font-size:10px;color:var(--text3);}
.sb-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.sb-circle{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.proj-list{padding:10px;}
.proj-card{padding:9px 10px;border-radius:8px;margin-bottom:5px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.proj-card:active{opacity:.8;}
.proj-card.selected{border-color:var(--indigo);background:var(--bg3);}
.proj-card-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.proj-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.proj-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.priority-badge{font-size:9px;padding:1px 5px;border-radius:4px;border:1px solid;flex-shrink:0;}
.cat-tag{font-size:9px;padding:1px 6px;border-radius:10px;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog-bar-row{display:flex;align-items:center;gap:5px;}
.prog-track{flex:1;height:2px;background:#1e2536;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;}
.prog-label{font-size:9px;color:var(--text3);}
.new-proj-form{background:var(--bg3);border:1px solid var(--indigo);border-radius:10px;padding:10px;margin-bottom:8px;}
.input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.input:focus{border-color:var(--indigo);}
.chip-row{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0;}
.chip{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;}
.detail-header{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.detail-title{font-size:17px;font-weight:700;cursor:text;flex:1;}
.detail-title-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.status-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;margin-bottom:8px;}
.add-row{display:flex;gap:5px;margin-bottom:8px;}
.task-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #0f0f1a;}
.task-row.done-row{opacity:.5;}
.task-row.dragging{opacity:.3;background:var(--bg3);}
.task-row.drag-over{border-top:2px solid var(--indigo);}
.task-check{width:15px;height:15px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.task-check.done{border-color:var(--indigo);background:var(--indigo);}
.task-text{flex:1;font-size:12px;cursor:text;}
.task-text.done{color:var(--text3);text-decoration:line-through;}
.drag-handle{cursor:grab;color:var(--text3);font-size:12px;padding:0 2px;flex-shrink:0;user-select:none;}
.drag-handle:active{cursor:grabbing;}
.note-card{padding:7px 9px;border-radius:8px;margin-bottom:5px;background:var(--bg);border:1px solid var(--border);}
.note-text{font-size:12px;line-height:1.55;color:#c4cad8;margin-bottom:3px;}
.note-footer{display:flex;justify-content:space-between;align-items:center;}
.note-date{font-size:10px;color:var(--text3);}
.empty-hint{font-size:11px;color:var(--text3);text-align:center;padding:10px 0;}
.divider-done{font-size:10px;color:var(--text3);padding:5px 0 3px;border-top:1px dashed #1e2536;margin-top:4px;}
.ai-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--indigo);box-shadow:0 0 8px var(--indigo);transition:all .3s;flex-shrink:0;}
.ai-dot.loading{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.ai-title{font-size:12px;font-weight:700;color:#a5b4fc;}
.ai-sub{font-size:10px;color:var(--text3);}
.action-pills{padding:5px 12px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;background:#052e16;color:var(--green);border:1px solid #14532d;}
.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.chat-hint{color:var(--text3);font-size:12px;text-align:center;margin-top:20px;line-height:2.3;}
.bubble{max-width:90%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.65;white-space:pre-wrap;}
.bubble.user{align-self:flex-end;background:#1e1b4b;border:1px solid #4338ca;color:#c7d2fe;}
.bubble.assistant{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);color:var(--text);}
.bubble.loading-bubble{align-self:flex-start;color:var(--indigo);background:var(--bg3);border:1px solid var(--border);}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;}
.empty-state{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#1e2536;}
.overlay{display:none;position:fixed;inset:0;background:#000a;z-index:99;}
.overlay.open{display:block;}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:20px;}
.sync-badge.ok{background:#052e16;color:var(--green);}
.sync-badge.saving{background:#2d1b00;color:var(--amber);}
.sync-badge.error{background:#1f0a0a;color:var(--red);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">◈</div>
      <div>
        <div class="logo-title">PROJECT SECRETARY</div>
        <div class="logo-sub" id="proj-count">กำลังโหลด...</div>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="sync-badge ok" id="sync-badge">✓ ซิงค์แล้ว</span>
      <button class="btn btn-ai" id="btn-menu" onclick="toggleSidebar()" style="display:none">☰</button>
      <button class="btn btn-ai" id="btn-hide-done" onclick="toggleHideDone()">ซ่อน Done</button>
      <button class="btn btn-ai" id="btn-ai-toggle" onclick="toggleAI()">✦ AI</button>
      <button class="btn btn-primary" onclick="showNewProj()">+ โปรเจกต์</button>
    </div>
  </div>
  <div class="main">
    <div class="overlay" id="overlay" onclick="closeAll()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <div class="sb-section">
          <div class="sb-label">สถานะ</div>
          <button class="sb-btn active" id="f-status-all" onclick="setFilter('status','all')"><div class="sb-circle" style="background:#4b5563"></div>ทั้งหมด<span class="sb-count" id="fc-all">0</span></button>
          <button class="sb-btn" id="f-status-active" onclick="setFilter('status','active')"><div class="sb-circle" style="background:#22c55e"></div>กำลังดำเนินการ<span class="sb-count" id="fc-active">0</span></button>
          <button class="sb-btn" id="f-status-pending" onclick="setFilter('status','pending')"><div class="sb-circle" style="background:#f59e0b"></div>รอดำเนินการ<span class="sb-count" id="fc-pending">0</span></button>
          <button class="sb-btn" id="f-status-blocked" onclick="setFilter('status','blocked')"><div class="sb-circle" style="background:#ef4444"></div>ติดขัด<span class="sb-count" id="fc-blocked">0</span></button>
          <button class="sb-btn" id="f-status-done" onclick="setFilter('status','done')"><div class="sb-circle" style="background:#6b7280"></div>เสร็จสิ้น<span class="sb-count" id="fc-done">0</span></button>
        </div>
        <div class="sb-section">
          <div class="sb-label">ความเร่งด่วน</div>
          <button class="sb-btn active" id="f-priority-all" onclick="setFilter('priority','all')"><div class="sb-dot" style="background:#4b5563"></div>ทุกระดับ<span class="sb-count" id="fpc-all">0</span></button>
          <button class="sb-btn" id="f-priority-high" onclick="setFilter('priority','high')"><div class="sb-dot" style="background:#ef4444"></div>ด่วน<span class="sb-count" id="fpc-high">0</span></button>
          <button class="sb-btn" id="f-priority-mid" onclick="setFilter('priority','mid')"><div class="sb-dot" style="background:#f59e0b"></div>ปานกลาง<span class="sb-count" id="fpc-mid">0</span></button>
          <button class="sb-btn" id="f-priority-low" onclick="setFilter('priority','low')"><div class="sb-dot" style="background:#4b5563"></div>ปกติ<span class="sb-count" id="fpc-low">0</span></button>
          <button class="sb-btn" id="f-priority-completed" onclick="setFilter('priority','completed')"><div class="sb-dot" style="background:#22c55e"></div>เสร็จแล้ว<span class="sb-count" id="fpc-completed">0</span></button>
        </div>
        <div class="sb-section">
          <div class="sb-label">ความคืบหน้า</div>
          <button class="sb-btn active" id="f-prog-all" onclick="setFilter('progress','all')"><div class="sb-dot" style="background:#374151"></div>ทุกระดับ</button>
          <button class="sb-btn" id="f-prog-none" onclick="setFilter('progress','none')"><div class="sb-dot" style="background:#ef4444"></div>ยังไม่เริ่ม (0%)</button>
          <button class="sb-btn" id="f-prog-low" onclick="setFilter('progress','low')"><div class="sb-dot" style="background:#f59e0b"></div>เริ่มแล้ว (1–49%)</button>
          <button class="sb-btn" id="f-prog-mid" onclick="setFilter('progress','mid')"><div class="sb-dot" style="background:#6366f1"></div>ใกล้เสร็จ (50–99%)</button>
          <button class="sb-btn" id="f-prog-full" onclick="setFilter('progress','full')"><div class="sb-dot" style="background:#22c55e"></div>เสร็จครบ (100%)</button>
        </div>
        <div class="sb-section">
          <div class="sb-label">หมวดหมู่</div>
          <div id="cat-filter-list"></div>
        </div>
        <div class="proj-list" id="proj-list"></div>
      </div>
    </div>
    <div class="content">
      <div class="empty-state" id="empty-state"><div style="font-size:34px">◈</div><div style="font-size:13px">เลือกโปรเจกต์ หรือสร้างใหม่</div></div>
      <div id="detail" style="display:none"></div>
    </div>
    <div class="ai-panel" id="ai-panel" style="display:none">
      <div class="ai-header">
        <div class="ai-dot" id="ai-dot"></div>
        <div><div class="ai-title">AI Secretary</div><div class="ai-sub">อ่าน+เขียนข้อมูลได้โดยตรง</div></div>
      </div>
      <div id="action-pills" style="display:none" class="action-pills"></div>
      <div class="chat-area" id="chat-area">
        <div class="chat-hint">ลองพูดว่า<br>"สรุปโปรเจกต์ทั้งหมด"<br>"เพิ่มโปรเจกต์ใหม่ชื่อ X"<br>"เพิ่ม task ให้โปรเจกต์ X"<br>"mark งานนี้ว่าเสร็จแล้ว"</div>
      </div>
      <div class="chat-input-row">
        <input class="input" id="ai-input" placeholder="สั่งงาน AI..." onkeydown="if(event.key==='Enter')sendAI()">
        <button class="btn btn-primary" onclick="sendAI()" id="btn-send">ส่ง</button>
      </div>
    </div>
  </div>
</div>
<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbw7jdVrR-yyXNez2Y1sLta0ULRH6FlNiTIyPvzp2SQtwRexwS1-8Q9F2T12fbfviD_I/exec";
const STATUS={active:{label:"กำลังดำเนินการ",color:"#22c55e",bg:"#052e16"},pending:{label:"รอดำเนินการ",color:"#f59e0b",bg:"#2d1b00"},done:{label:"เสร็จสิ้น",color:"#6b7280",bg:"#111827"},blocked:{label:"ติดขัด",color:"#ef4444",bg:"#1f0a0a"}};
const PRIORITY={high:{label:"ด่วน",color:"#ef4444"},mid:{label:"ปานกลาง",color:"#f59e0b"},low:{label:"ปกติ",color:"#4b5563"},completed:{label:"เสร็จแล้ว",color:"#22c55e"}};
const CAT_COLORS=["#6366f1","#22c55e","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#ec4899","#84cc16","#64748b"];
const AI_TOOLS=[
  {name:"get_all_projects",description:"ดึงข้อมูลโปรเจกต์ทั้งหมด",input_schema:{type:"object",properties:{},required:[]}},
  {name:"create_project",description:"สร้างโปรเจกต์ใหม่",input_schema:{type:"object",properties:{name:{type:"string"},status:{type:"string",enum:["active","pending","done","blocked"]},priority:{type:"string",enum:["high","mid","low"]},category:{type:"string"}},required:["name"]}},
  {name:"update_project",description:"แก้ไขโปรเจกต์",input_schema:{type:"object",properties:{project_id:{type:"string"},name:{type:"string"},status:{type:"string",enum:["active","pending","done","blocked"]},priority:{type:"string",enum:["high","mid","low"]},category:{type:"string"}},required:["project_id"]}},
  {name:"delete_project",description:"ลบโปรเจกต์",input_schema:{type:"object",properties:{project_id:{type:"string"}},required:["project_id"]}},
  {name:"add_task",description:"เพิ่ม task",input_schema:{type:"object",properties:{project_id:{type:"string"},text:{type:"string"}},required:["project_id","text"]}},
  {name:"update_task",description:"แก้ไขหรือ mark done/undone task",input_schema:{type:"object",properties:{project_id:{type:"string"},task_id:{type:"string"},text:{type:"string"},done:{type:"boolean"}},required:["project_id","task_id"]}},
  {name:"delete_task",description:"ลบ task",input_schema:{type:"object",properties:{project_id:{type:"string"},task_id:{type:"string"}},required:["project_id","task_id"]}},
  {name:"add_note",description:"เพิ่ม note",input_schema:{type:"object",properties:{project_id:{type:"string"},text:{type:"string"}},required:["project_id","text"]}},
  {name:"delete_note",description:"ลบ note",input_schema:{type:"object",properties:{project_id:{type:"string"},note_id:{type:"string"}},required:["project_id","note_id"]}},
];
let projects=[],selectedId=null,aiHistory=[],isMobile=window.innerWidth<=700;
let isSaving=false,pendingSave=false,hideDone=true;
const F={status:"all",priority:"all",progress:"all",cat:"all"};
window.addEventListener('resize',()=>{isMobile=window.innerWidth<=700;updateMobileUI();});
function genId(){return'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';return new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateMobileUI(){document.getElementById('btn-menu').style.display=isMobile?'':'none';}
window.toggleHideDone=()=>{
  hideDone=!hideDone;
  const btn=document.getElementById('btn-hide-done');
  btn.className=hideDone?'btn btn-ai active':'btn btn-ai';
  btn.textContent=hideDone?'✓ ซ่อน Done':'ซ่อน Done';
  renderProjList();renderSidebarCounts();
};
function getPct(p){const t=(p.tasks||[]).length;return t?Math.round((p.tasks||[]).filter(t=>t.done).length/t*100):0;}
function getCatColor(cat){const cats=getAllCats();return CAT_COLORS[cats.indexOf(cat)%CAT_COLORS.length]||'#4b5563';}
function getAllCats(){const s=new Set();projects.forEach(p=>{if(p.category&&p.category.trim())s.add(p.category.trim());});return Array.from(s).sort();}
function dedup(arr){const s=new Set();return arr.filter(p=>{if(!p.id||s.has(p.id))return false;s.add(p.id);return true;});}
function setSyncStatus(state,text){const b=document.getElementById('sync-badge');b.className='sync-badge '+state;b.textContent=text;}
async function loadFromSheet(){
  setSyncStatus('saving','⟳ กำลังโหลด...');
  try{const res=await fetch(GAS_URL+'?action=get&t='+Date.now());const data=await res.json();
    if(data.ok){projects=dedup(data.projects||[]);setSyncStatus('ok','✓ ซิงค์แล้ว');try{localStorage.setItem('psec-bk',JSON.stringify(projects));}catch{}}
    else setSyncStatus('error','✗ โหลดไม่สำเร็จ');
  }catch{setSyncStatus('error','✗ ออฟไลน์');try{const s=localStorage.getItem('psec-bk');if(s)projects=dedup(JSON.parse(s));}catch{}}
  renderAll();
}
function scheduleSave(){setSyncStatus('saving','⟳ กำลังบันทึก...');try{localStorage.setItem('psec-bk',JSON.stringify(projects));}catch{}if(isSaving){pendingSave=true;return;}_doSave();}
async function _doSave(){isSaving=true;pendingSave=false;try{const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save_all',projects:dedup(projects)})});const data=await res.json();setSyncStatus(data.ok?'ok':'error',data.ok?'✓ ซิงค์แล้ว':'✗ บันทึกไม่สำเร็จ');}catch{setSyncStatus('error','✗ บันทึกไม่สำเร็จ');}isSaving=false;if(pendingSave)_doSave();}
window.setFilter=(type,val)=>{
  F[type]=val;
  if(type==='status'){['all','active','pending','blocked','done'].forEach(k=>{const el=document.getElementById('f-status-'+k);if(el)el.className='sb-btn'+(k===val?' active':'');});}
  if(type==='priority'){['all','high','mid','low','completed'].forEach(k=>{const el=document.getElementById('f-priority-'+k);if(el)el.className='sb-btn'+(k===val?' active':'');});}
  if(type==='progress'){['all','none','low','mid','full'].forEach(k=>{const el=document.getElementById('f-prog-'+k);if(el)el.className='sb-btn'+(k===val?' active':'');});}
  if(type==='cat')renderCatFilters();
  renderProjList();
};
function applyFilters(list){
  return list.filter(p=>{
    if(hideDone&&p.status==='done')return false;
    if(F.status!=='all'&&p.status!==F.status)return false;
    if(F.priority!=='all'&&(p.priority||'mid')!==F.priority)return false;
    const pct=getPct(p);
    if(F.progress==='none'&&pct!==0)return false;
    if(F.progress==='low'&&(pct<1||pct>=50))return false;
    if(F.progress==='mid'&&(pct<50||pct>=100))return false;
    if(F.progress==='full'&&pct!==100)return false;
    if(F.cat!=='all'&&(p.category||'').trim()!==F.cat)return false;
    return true;
  });
}

window.dragStart=(e)=>{dragSrcTid=e.currentTarget.dataset.tid;dragSrcPid=e.currentTarget.dataset.pid;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';};

window.dragDrop=(e)=>{
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const toTid=e.currentTarget.dataset.tid;const toPid=e.currentTarget.dataset.pid;
  if(!dragSrcTid||dragSrcTid===toTid||dragSrcPid!==toPid)return;
  const p=projects.find(p=>p.id===dragSrcPid);if(!p)return;
  const tasks=p.tasks;
  const fromIdx=tasks.findIndex(t=>t.id===dragSrcTid);
  const toIdx=tasks.findIndex(t=>t.id===toTid);
  if(fromIdx<0||toIdx<0)return;
  const moved=tasks.splice(fromIdx,1)[0];
  tasks.splice(toIdx,0,moved);
  scheduleSave();renderDetail();
};

window.toggleTask=(pid,tid)=>{
  const p=projects.find(p=>p.id===pid);if(!p)return;
  p.tasks=(p.tasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t);
  const tot=(p.tasks||[]).length;
  const dn=(p.tasks||[]).filter(t=>t.done).length;
  // task ครบ 100% → เปลี่ยนเป็น done + priority เป็น completed
  if(tot>0&&dn===tot&&p.status!=='blocked'){p.status='done';p.priority='completed';}
  // untick task → กลับเป็น active + ล้าง completed priority
  if(dn<tot&&p.status==='done'){p.status='active';if(p.priority==='completed')p.priority='mid';}
  scheduleSave();renderDetail();renderProjList();renderSidebarCounts();
};

function runTool(name,input){
  let result='',actionDesc=null;
  if(name==='get_all_projects'){result=JSON.stringify(projects);}
  else if(name==='create_project'){if(projects.some(p=>p.name.trim()===input.name.trim())){result=JSON.stringify({error:'duplicate'});return{result,actionDesc};}const p={id:genId(),name:input.name,status:input.status||'active',priority:input.priority||'mid',category:input.category||'',notes:[],tasks:[],createdAt:today()};projects.unshift(p);result=JSON.stringify({ok:true,project:p});actionDesc=`สร้าง "${p.name}"`;}
  else if(name==='update_project'){const p=projects.find(p=>p.id===input.project_id);if(p){if(input.name)p.name=input.name;if(input.status)p.status=input.status;if(input.priority)p.priority=input.priority;if(input.category!==undefined)p.category=input.category;result=JSON.stringify({ok:true,project:p});actionDesc=`อัปเดต "${p.name}"`;}}
  else if(name==='delete_project'){const p=projects.find(p=>p.id===input.project_id);projects=dedup(projects.filter(p=>p.id!==input.project_id));if(selectedId===input.project_id)selectedId=null;result=JSON.stringify({ok:true});actionDesc=`ลบ "${p?.name}"`;}
  else if(name==='add_task'){const p=projects.find(p=>p.id===input.project_id);if(p){const t={id:genId(),text:input.text,done:false};p.tasks=[...(p.tasks||[]),t];result=JSON.stringify({ok:true,task:t});actionDesc=`เพิ่ม task "${input.text}"`;}}
  else if(name==='update_task'){
    const p=projects.find(p=>p.id===input.project_id);
    if(p){
      p.tasks=(p.tasks||[]).map(t=>{if(t.id!==input.task_id)return t;if(input.text!==undefined)t.text=input.text;if(input.done!==undefined)t.done=input.done;return t;});
      // auto status จาก AI tool ด้วย
      const tot=(p.tasks||[]).length,dn=(p.tasks||[]).filter(t=>t.done).length;
      if(tot>0&&dn===tot&&p.status!=='blocked')p.status='done';
      if(dn<tot&&p.status==='done')p.status='active';
      result=JSON.stringify({ok:true});actionDesc=`อัปเดต task`;
    }
  }
  else if(name==='delete_task'){const p=projects.find(p=>p.id===input.project_id);if(p){p.tasks=(p.tasks||[]).filter(t=>t.id!==input.task_id);result=JSON.stringify({ok:true});actionDesc=`ลบ task`;}}
  else if(name==='add_note'){const p=projects.find(p=>p.id===input.project_id);if(p){const n={id:genId(),text:input.text,date:today()};p.notes=[n,...(p.notes||[])];result=JSON.stringify({ok:true,note:n});actionDesc=`เพิ่ม note`;}}
  else if(name==='delete_note'){const p=projects.find(p=>p.id===input.project_id);if(p){p.notes=(p.notes||[]).filter(n=>n.id!==input.note_id);result=JSON.stringify({ok:true});actionDesc=`ลบ note`;}}
  else result=JSON.stringify({error:'unknown'});
  return{result,actionDesc};
}

      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,tools:AI_TOOLS,messages:toApi(aiHistory)})});
      const data=await res.json();
      const content=data.content||[],toolBlocks=content.filter(b=>b.type==='tool_use'),textBlocks=content.filter(b=>b.type==='text');
      aiHistory.push({role:'assistant',content});
      if(!toolBlocks.length||data.stop_reason==='end_turn'){loadingBubble?.remove();loadingBubble=null;addBubble('assistant',textBlocks.map(b=>b.text).join('\n').trim()||'เสร็จแล้วครับ');break;}
      if(!loadingBubble)loadingBubble=addBubble('loading-bubble','กำลังดำเนินการ...');
      const toolResults=[];
      for(const tb of toolBlocks){const{result,actionDesc}=runTool(tb.name,tb.input);if(actionDesc)actions.push(actionDesc);toolResults.push({type:'tool_result',tool_use_id:tb.id,content:result});}
      scheduleSave();renderAll();showActions(actions);
      aiHistory.push({role:'user',content:toolResults});
    }
  }catch(e){loadingBubble?.remove();addBubble('assistant','เกิดข้อผิดพลาด: '+e.message);}
  setAILoading(false);
};
loadFromSheet();
document.getElementById('btn-hide-done').className='btn btn-ai active';
document.getElementById('btn-hide-done').textContent='✓ ซ่อน Done';
</script>
